<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'">
    <title>Brain Speed Exercises</title>
    <link rel="stylesheet" href="./style.css">
</head>

<body>
    <a href="#game-selector" class="skip-link">Skip to games</a>

    <header>
        <h1>Brain Speed Exercises</h1>
    </header>

    <nav aria-label="Game selection">
    </nav>

    <main id="game-container">
        <section id="game-selector" aria-label="Available games">
        </section>
    </main>

    <!-- ── Play-time summary bar ───────────────────────────────────────────── -->
    <div id="play-time-bar" class="play-time-bar" hidden>
        <span class="play-time-bar__label">
            Today's total:
            <strong id="total-time-today" aria-live="polite" aria-atomic="true">00:00</strong>
        </span>
        <button id="view-history-btn" type="button" class="play-time-bar__btn">
            View History
        </button>
    </div>

    <!-- ── History panel (modal overlay) ─────────────────────────────────── -->
    <div
        id="history-panel"
        class="history-panel"
        hidden
        role="dialog"
        aria-modal="true"
        aria-labelledby="history-panel-title"
    >
        <div class="history-panel__inner">
            <div class="history-panel__header">
                <h2 id="history-panel-title" class="history-panel__title">Play History</h2>
                <button id="history-close-btn" type="button" class="history-panel__close"
                    aria-label="Close play history">
                    ✕
                </button>
            </div>
            <div id="history-panel-body" class="history-panel__body"></div>
        </div>
    </div>

    <footer>
        <p>Brain Speed Exercises</p>
    </footer>

    <script type="module" src="./interface.js"></script>
</body>

</html>
