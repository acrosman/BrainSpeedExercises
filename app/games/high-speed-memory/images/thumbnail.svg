<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <rect width="200" height="200" fill="#1a1a2e"/>
  <!-- Grid of memory cards -->
  <rect x="20" y="20" width="70" height="70" rx="8" fill="#16213e" stroke="#e94560" stroke-width="2"/>
  <rect x="110" y="20" width="70" height="70" rx="8" fill="#e94560"/>
  <rect x="20" y="110" width="70" height="70" rx="8" fill="#e94560"/>
  <rect x="110" y="110" width="70" height="70" rx="8" fill="#16213e" stroke="#e94560" stroke-width="2"/>
  <!-- Stars on face-up cards -->
  <text x="145" y="62" font-size="32" text-anchor="middle" fill="#ffffff">★</text>
  <text x="55" y="152" font-size="32" text-anchor="middle" fill="#ffffff">★</text>
  <!-- Question marks on face-down cards -->
  <text x="55" y="62" font-size="32" text-anchor="middle" fill="#e94560">?</text>
  <text x="145" y="152" font-size="32" text-anchor="middle" fill="#e94560">?</text>
</svg>
